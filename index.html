<section id="contact">
  <div class="container">
    <h2 class="sec-title">Kontak</h2>

    <!-- ACCESS KEY (WAJIB DIISI) -->
    <form id="contact-form">
      <input type="hidden" name="access_key" value="ISI_ACCESS_KEY_KAMU">

      <div class="fg">
        <label>Nama</label>
        <input type="text" name="name" required placeholder="Nama kamu">
      </div>

      <div class="fg">
        <label>Email</label>
        <input type="email" name="email" required placeholder="email@contoh.com">
      </div>

      <div class="fg">
        <label>Pesan</label>
        <textarea name="message" required placeholder="Tulis pesan..."></textarea>
      </div>

      <button type="submit" class="btn-send">Kirim Pesan 💌</button>

      <p id="result"></p>
    </form>
  </div>
</section>
